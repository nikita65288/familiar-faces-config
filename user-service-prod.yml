spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/user_service_db
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  liquibase:
    url: jdbc:postgresql://${DB_HOST}:5432/user_service_db
    user: ${DB_USER}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: redis
      port: 6379

  kafka:
    bootstrap-servers: kafka:9092    

  jpa:
    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
  instance:
    hostname: user-service
    preferIpAddress: false      
