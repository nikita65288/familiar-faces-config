spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/auth_service_db
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  liquibase:
    url: jdbc:postgresql://postgres:5432/auth_service_db
    user: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/

jwt:
  secret: ${JWT_SECRET}   
  expiration: ${JWT_EXPIRATION}
